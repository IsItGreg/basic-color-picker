<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <style>
      .outline { stroke: #111827; stroke-width: 32; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Outer pin -->
  <path d="M512 86
           C351 86 222 215 222 376
           C222 491 275 608 383 768
           L512 944
           L641 768
           C749 608 802 491 802 376
           C802 215 673 86 512 86 Z"
        fill="white" class="outline"/>

  <!-- White backing circle for wheel -->
  <circle cx="512" cy="390" r="256" fill="white"/>

  <!-- Donut segments built from stroked arcs -->
  <g transform="rotate(-90 512 390)">
    <circle cx="512" cy="390" r="170" fill="none" stroke="#FF513E" stroke-width="98"
            stroke-linecap="butt" pathLength="100" stroke-dasharray="18 82" stroke-dashoffset="0"/>
    <circle cx="512" cy="390" r="170" fill="none" stroke="#F4C20D" stroke-width="98"
            stroke-linecap="butt" pathLength="100" stroke-dasharray="18 82" stroke-dashoffset="20"/>
    <circle cx="512" cy="390" r="170" fill="none" stroke="#44C553" stroke-width="98"
            stroke-linecap="butt" pathLength="100" stroke-dasharray="18 82" stroke-dashoffset="40"/>
    <circle cx="512" cy="390" r="170" fill="none" stroke="#1F6BFF" stroke-width="98"
            stroke-linecap="butt" pathLength="100" stroke-dasharray="18 82" stroke-dashoffset="60"/>
    <circle cx="512" cy="390" r="170" fill="none" stroke="#7C3AED" stroke-width="98"
            stroke-linecap="butt" pathLength="100" stroke-dasharray="18 82" stroke-dashoffset="80"/>
  </g>

  <!-- Center hole -->
  <circle cx="512" cy="390" r="122" fill="white"/>
</svg>
