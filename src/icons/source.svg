<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Basic Color Picker icon">
  <defs>
    <filter id="subtleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Transparent background -->

  <!-- Map pin: white interior with dark charcoal outline -->
  <path
    d="M512 72
       C347 72 214 205 214 370
       C214 491 276 622 386 774
       L512 944
       L638 774
       C748 622 810 491 810 370
       C810 205 677 72 512 72 Z"
    fill="#ffffff"
    stroke="#111820"
    stroke-width="42"
    stroke-linejoin="round"
    stroke-linecap="round"
    filter="url(#subtleShadow)"
  />

  <!-- Color wheel positioned in the round head of the pin -->
  <g>
    <path id="wheel-coral" d="M 297.7 469.9 A 228.0 228.0 0 0 1 512.0 164.0 L 512.0 300.0 A 92.0 92.0 0 0 0 425.5 423.5 Z" fill="#ff4f3e"/>
    <path id="wheel-yellow" d="M 520.0 164.1 A 228.0 228.0 0 0 1 726.3 314.1 L 598.5 423.5 A 92.0 92.0 0 0 0 515.2 300.1 Z" fill="#f7c414"/>
    <path id="wheel-green" d="M 730.5 327.8 A 228.0 228.0 0 0 1 645.9 576.4 L 566.0 466.3 A 92.0 92.0 0 0 0 600.2 365.2 Z" fill="#43bd4e"/>
    <path id="wheel-blue" d="M 632.3 585.7 A 228.0 228.0 0 0 1 378.1 576.4 L 458.0 466.3 A 92.0 92.0 0 0 0 560.5 470.2 Z" fill="#136fff"/>
    <path id="wheel-purple" d="M 364.4 565.8 A 228.0 228.0 0 0 1 292.9 454.4 L 423.6 414.9 A 92.0 92.0 0 0 0 452.4 462.1 Z" fill="#7b35d8"/>
    <circle cx="512" cy="392" r="92" fill="#ffffff"/>
  </g>
</svg>
